mission_layout:
  layout_id: warehouse_layout_example
  description: Replace this file with the final Mission Layout from ChatGPT or the hackathon design source.

warehouse:
  width_tiles: 12
  height_tiles: 8
  tile_size_m: 1.0
  movement_model: four_direction_grid
  lock_model: current_and_next_tile

zones:
  - zone_id: inbound_reserve
    type: reserve
    tiles: [T_00_00, T_01_00]
  - zone_id: pick_aisle_A
    type: pick_aisle
    tiles: [T_03_01, T_03_02, T_03_03, T_03_04, T_03_05, T_03_06]
  - zone_id: pick_aisle_B
    type: pick_aisle
    tiles: [T_08_01, T_08_02, T_08_03, T_08_04, T_08_05, T_08_06]
  - zone_id: outbound
    type: outbound
    tiles: [T_10_07, T_11_07]
  - zone_id: buffer
    type: deadlock_buffer
    tiles: [T_05_00, T_06_00, T_05_07, T_06_07]

tiles:
  generation: rectangular_grid
  id_format: T_{x:02d}_{y:02d}
  traversable_default: true
  blocked_tiles:
    - T_04_02
    - T_04_03
    - T_04_04
    - T_07_02
    - T_07_03
    - T_07_04

racks:
  - rack_id: rack_A_01
    sku_id: SKU_LIGHT
    pick_tile_id: T_03_02
    storage_tile_id: T_04_02
    quantity: 100
  - rack_id: rack_A_02
    sku_id: SKU_MEDIUM
    pick_tile_id: T_03_04
    storage_tile_id: T_04_04
    quantity: 80
  - rack_id: rack_B_01
    sku_id: SKU_HEAVY
    pick_tile_id: T_08_02
    storage_tile_id: T_07_02
    quantity: 40
  - rack_id: rack_B_02
    sku_id: SKU_FRAGILE
    pick_tile_id: T_08_04
    storage_tile_id: T_07_04
    quantity: 50

outbound:
  conveyors:
    - conveyor_id: CONV_01
      unload_tile_id: T_10_07
      capacity_packages: 4
    - conveyor_id: CONV_02
      unload_tile_id: T_11_07
      capacity_packages: 4

robots:
  - robot_id: R_01
    robot_type_id: quadbot_standard
    start_tile_id: T_00_00
    max_payload_weight: 6.0
    handling_skill_level: 3
  - robot_id: R_02
    robot_type_id: quadbot_standard
    start_tile_id: T_01_00
    max_payload_weight: 6.0
    handling_skill_level: 3
  - robot_id: R_03
    robot_type_id: quadbot_heavy
    start_tile_id: T_02_00
    max_payload_weight: 10.0
    handling_skill_level: 2

order_profiles:
  - profile_id: mixed_priority_stream
    generation_mode: poisson
    average_orders_per_1000_ticks: 35
    skus:
      - sku_id: SKU_LIGHT
        weight: 1.0
        difficulty: 1
        probability: 0.35
      - sku_id: SKU_MEDIUM
        weight: 3.0
        difficulty: 2
        probability: 0.35
      - sku_id: SKU_HEAVY
        weight: 8.0
        difficulty: 2
        probability: 0.15
      - sku_id: SKU_FRAGILE
        weight: 2.0
        difficulty: 4
        probability: 0.15
    priority_distribution:
      low: 0.50
      normal: 0.35
      high: 0.12
      urgent: 0.03
