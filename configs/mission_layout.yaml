mission_layout:
  layout_id: warehouse_layout_v1_nine_robot
  description: Runtime-ready outbound-only warehouse layout for the FF hackathon simulator.

warehouse:
  width_tiles: 20
  height_tiles: 14
  tile_size_m: 2.0
  nominal_robot_speed_mps: 1.0
  movement_model: four_direction_grid
  lock_model: current_and_next_tile

zones:
  - zone_id: depot
    type: robot_depot
    tiles: [T_00_11, T_01_11, T_02_11, T_00_12, T_01_12, T_02_12, T_00_13, T_01_13, T_02_13]
  - zone_id: pick_aisle_A
    type: pick_aisle
    tiles: [T_03_02, T_03_03, T_03_04, T_03_05, T_03_06, T_03_07, T_03_08, T_03_09]
  - zone_id: pick_aisle_B
    type: pick_aisle
    tiles: [T_08_02, T_08_03, T_08_04, T_08_05, T_08_06, T_08_07, T_08_08, T_08_09]
  - zone_id: pick_aisle_C
    type: pick_aisle
    tiles: [T_13_02, T_13_03, T_13_04, T_13_05, T_13_06, T_13_07, T_13_08, T_13_09]
  - zone_id: outbound
    type: outbound
    tiles: [T_19_11, T_16_13, T_16_00, T_00_06]
  - zone_id: buffer
    type: deadlock_buffer
    tiles: [T_05_00, T_06_00, T_10_00, T_11_00, T_15_00, T_17_00, T_05_12, T_10_12, T_15_12]

tiles:
  generation: rectangular_grid
  id_format: T_{x:02d}_{y:02d}
  traversable_default: true
  blocked_tiles:
    - T_04_02
    - T_04_03
    - T_04_04
    - T_04_05
    - T_04_06
    - T_04_07
    - T_04_08
    - T_04_09
    - T_09_02
    - T_09_03
    - T_09_04
    - T_09_05
    - T_09_06
    - T_09_07
    - T_09_08
    - T_09_09
    - T_14_02
    - T_14_03
    - T_14_04
    - T_14_05
    - T_14_06
    - T_14_07
    - T_14_08
    - T_14_09

rack_modules:
