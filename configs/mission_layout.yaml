order_profiles:
  - profile_id: low_load
    orders_per_hour: 120
    skus: &sku_mix
      - {sku_id: SKU_CARD_SMALL, weight: 0.8, difficulty: 1, probability: 0.24}
      - {sku_id: SKU_WOOD_MED, weight: 2.0, difficulty: 2, probability: 0.22}
      - {sku_id: SKU_METAL_HEAVY, weight: 7.5, difficulty: 3, probability: 0.12}
      - {sku_id: SKU_FRAGILE_LIGHT, weight: 1.2, difficulty: 4, probability: 0.12}
      - {sku_id: SKU_BULK_FOAM, weight: 4.0, difficulty: 2, probability: 0.12}
      - {sku_id: SKU_TOOLKIT, weight: 5.5, difficulty: 3, probability: 0.10}
      - {sku_id: SKU_MEDICAL_BIN, weight: 2.5, difficulty: 4, probability: 0.08}
    priority_distribution: {low: 0.50, normal: 0.35, high: 0.12, urgent: 0.03}
  - profile_id: medium_load
    orders_per_hour: 300
    skus: *sku_mix
    priority_distribution: {low: 0.38, normal: 0.40, high: 0.17, urgent: 0.05}
  - profile_id: high_load
    orders_per_hour: 540
    skus: *sku_mix
    priority_distribution: {low: 0.24, normal: 0.38, high: 0.28, urgent: 0.10}
